<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Gradient top-left blob -->
  <ellipse cx="0" cy="0" rx="500" ry="400" fill="#6366f1" fill-opacity="0.12"/>
  <!-- Gradient bottom-right blob -->
  <ellipse cx="1200" cy="630" rx="500" ry="380" fill="#8b5cf6" fill-opacity="0.10"/>
  <!-- Subtle grid lines -->
  <line x1="80" y1="0" x2="80" y2="630" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="80" x2="1200" y2="80" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="550" x2="1200" y2="550" stroke="#1e293b" stroke-width="1"/>

  <!-- VivekMind label chip -->
  <rect x="80" y="160" width="170" height="36" rx="18" fill="#1e293b"/>
  <text x="164" y="184" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle">VivekMind</text>

  <!-- Main headline -->
  <text x="80" y="270" font-family="system-ui,-apple-system,sans-serif" font-size="64" font-weight="800" fill="#f8fafc" letter-spacing="-1">Schema Weaver</text>

  <!-- Tagline -->
  <text x="80" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="400" fill="#94a3b8">PostgreSQL schema management platform</text>

  <!-- Product chips -->
  <!-- SQL Editor chip -->
  <rect x="80" y="390" width="186" height="44" rx="22" fill="#6366f1" fill-opacity="0.15"/>
  <rect x="80" y="390" width="186" height="44" rx="22" stroke="#6366f1" stroke-width="1.5"/>
  <text x="173" y="418" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" fill="#818cf8" text-anchor="middle">SQL Editor</text>

  <!-- Data Explorer chip -->
  <rect x="282" y="390" width="200" height="44" rx="22" fill="#8b5cf6" fill-opacity="0.12"/>
  <rect x="282" y="390" width="200" height="44" rx="22" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="382" y="418" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" fill="#a78bfa" text-anchor="middle">Data Explorer</text>

  <!-- Docs chip -->
  <rect x="498" y="390" width="130" height="44" rx="22" fill="#0ea5e9" fill-opacity="0.12"/>
  <rect x="498" y="390" width="130" height="44" rx="22" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="563" y="418" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" fill="#38bdf8" text-anchor="middle">Docs</text>

  <!-- Bottom URL -->
  <text x="80" y="580" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#475569">vivekmind.com</text>

  <!-- Right decoration: abstract ER diagram lines -->
  <circle cx="950" cy="260" r="6" fill="#6366f1" fill-opacity="0.7"/>
  <circle cx="1050" cy="200" r="6" fill="#6366f1" fill-opacity="0.5"/>
  <circle cx="1100" cy="320" r="6" fill="#8b5cf6" fill-opacity="0.5"/>
  <circle cx="950" cy="380" r="6" fill="#8b5cf6" fill-opacity="0.6"/>
  <circle cx="1060" cy="420" r="6" fill="#6366f1" fill-opacity="0.4"/>
  <line x1="950" y1="260" x2="1050" y2="200" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="1050" y1="200" x2="1100" y2="320" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="1100" y1="320" x2="950" y2="380" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="950" y1="380" x2="1060" y2="420" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="950" y1="260" x2="950" y2="380" stroke="#6366f1" stroke-width="1" stroke-opacity="0.25"/>
  <!-- Node boxes for ER diagram decoration -->
  <rect x="860" y="230" width="130" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="925" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">users</text>
  <rect x="1000" y="160" width="140" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="1070" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">connections</text>
  <rect x="1020" y="300" width="130" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="1085" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">migrations</text>
  <rect x="860" y="360" width="130" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="925" y="395" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">schemas</text>
</svg>
